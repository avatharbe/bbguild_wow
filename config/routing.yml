avathar_bbguildwow_emblem:
    path: /bbguildwow/emblem/{guild_id}
    defaults: { _controller: avathar.bbguildwow.asset_controller:serve_emblem }
    requirements:
        guild_id: \d+

avathar_bbguildwow_portrait:
    path: /bbguildwow/portrait/{player_id}
    defaults: { _controller: avathar.bbguildwow.asset_controller:serve_portrait }
    requirements:
        player_id: \d+

avathar_bbguildwow_achiev_categories:
    path: /bbguildwow/achievements/categories/{guild_id}
    defaults: { _controller: avathar.bbguildwow.achievement_controller:categories }
    requirements:
        guild_id: \d+

avathar_bbguildwow_achiev_list:
    path: /bbguildwow/achievements/list/{guild_id}/{category_id}
    defaults: { _controller: avathar.bbguildwow.achievement_controller:achievement_list }
    requirements:
        guild_id: \d+
        category_id: \d+

avathar_bbguildwow_sync_roster:
