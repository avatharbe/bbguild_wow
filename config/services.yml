imports:
    - { resource: tables.yml }

services:
    avathar.bbguildwow.installer:
        class: avathar\bbguildwow\game\wow_installer
        arguments:
            - '@dbal.conn'
            - '@cache.driver'
            - '@config'
            - '@user'

    avathar.bbguildwow.api:
        class: avathar\bbguildwow\game\wow_api
        arguments:
            - '@cache'
            - '@dbal.conn'
            - '%avathar.bbguildwow.tables.bb_guild_wow%'
            - '%avathar.bbguild.tables.bb_players%'
            - '%avathar.bbguild.tables.bb_ranks%'

    avathar.bbguildwow.provider:
        class: avathar\bbguildwow\game\wow_provider
        arguments:
            - '@avathar.bbguildwow.installer'
            - '@avathar.bbguildwow.api'
            - '@ext.manager'
        tags:
            - { name: bbguild.game_provider }

    avathar.bbguildwow.listener:
        class: avathar\bbguildwow\event\listener
        arguments:
            - '@config'
            - '@template'
            - '@dbal.conn'
            - '@request'
            - '@controller.helper'
            - '%avathar.bbguildwow.tables.bb_guild_wow%'
            - '%avathar.bbguild.tables.bb_players%'
        tags:
            - { name: event.listener }

    avathar.bbguildwow.asset_controller:
        class: avathar\bbguildwow\controller\asset_controller
        arguments:
            - '@dbal.conn'
            - '%core.root_path%'
            - '%avathar.bbguild.tables.bb_guild%'
            - '%avathar.bbguild.tables.bb_players%'

    avathar.bbguildwow.portrait_controller:
        class: avathar\bbguildwow\controller\portrait_controller
        arguments:
            - '@avathar.bbguildwow.api'
            - '@dbal.conn'
            - '@avathar.bbguild.log'
            - '%avathar.bbguild.tables.bb_players%'
            - '%avathar.bbguild.tables.bb_guild%'
            - '%avathar.bbguild.tables.bb_games%'

    avathar.bbguildwow.achievement:
        class: avathar\bbguildwow\model\achievement
        arguments:
            - '@dbal.conn'
            - '@cache'
            - '@avathar.bbguild.util'
            - '%avathar.bbguildwow.tables.bb_achievement_track%'
            - '%avathar.bbguildwow.tables.bb_achievement%'
            - '%avathar.bbguildwow.tables.bb_achievement_rewards%'
            - '%avathar.bbguildwow.tables.bb_criteria_track%'
            - '%avathar.bbguildwow.tables.bb_achievement_criteria%'
            - '%avathar.bbguildwow.tables.bb_relations_table%'
            - '%avathar.bbguildwow.tables.bb_guild_wow%'
            - '%avathar.bbguildwow.tables.bb_achievement_category%'

    # --- Controllers ---

    avathar.bbguildwow.achievement_sync_controller:
        class: avathar\bbguildwow\controller\achievement_sync_controller
        arguments:
            - '@avathar.bbguildwow.achievement'
            - '@dbal.conn'
            - '@avathar.bbguild.log'
            - '%avathar.bbguild.tables.bb_guild%'
            - '%avathar.bbguild.tables.bb_games%'
            - '%avathar.bbguildwow.tables.bb_achievement%'

    avathar.bbguildwow.achievement_controller:
        class: avathar\bbguildwow\controller\achievement_controller
        arguments:
            - '@avathar.bbguildwow.achievement'
            - '@dbal.conn'
            - '@request'
            - '%avathar.bbguildwow.tables.bb_achievement%'
            - '%avathar.bbguildwow.tables.bb_achievement_track%'
            - '%avathar.bbguildwow.tables.bb_achievement_category%'
            - '%avathar.bbguildwow.tables.bb_relations_table%'
            - '%avathar.bbguildwow.tables.bb_achievement_criteria%'
            - '%avathar.bbguildwow.tables.bb_criteria_track%'

    # --- Portal modules ---

    avathar.bbguildwow.portal.module.achievements:
        class: avathar\bbguildwow\portal\modules\achievements
        arguments:
            - '@config'
            - '@dbal.conn'
            - '@template'
            - '@controller.helper'
            - '%avathar.bbguildwow.tables.bb_achievement%'
            - '%avathar.bbguildwow.tables.bb_achievement_track%'
            - '%avathar.bbguildwow.tables.bb_guild_wow%'
            - '@avathar.bbguildwow.achievement'
        tags:
            - { name: bbguild.portal.module }

    avathar.bbguildwow.portal.module.guild_news:
        class: avathar\bbguildwow\portal\modules\guild_news
        arguments:
            - '@dbal.conn'
            - '@template'
            - '%avathar.bbguild.tables.bb_news%'
            - '%avathar.bbguildwow.tables.bb_guild_wow%'
        tags:
            - { name: bbguild.portal.module }
